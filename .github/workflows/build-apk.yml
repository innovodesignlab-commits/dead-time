name: Build Dead Time APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Android project files
        run: flutter create --org com.deadtime.app --project-name dead_time .

      - name: Inject app name, internet permission, and AdMob ID
        run: |
          M=android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/><application#' $M
          sed -i 's#android:label="dead_time"#android:label="Dead Time"#' $M
          sed -i 's#</application>#<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/></application>#' $M
          sed -i 's#</application>#<meta-data android:name="io.flutter.embedding.android.EnableImpeller" android:value="false"/></application>#' $M
          echo "--- Final manifest: ---"
          cat $M

      - name: Set minimum Android version to 23
        run: |
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' "$f" || true
              sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' "$f" || true
            fi
          done

      - name: Get packages
        run: flutter pub get

      - name: Build the APK
        run: flutter build apk --release

      - name: Upload the APK for download
        uses: actions/upload-artifact@v4
        with:
          name: dead-time-apk
          path: build/app/outputs/flutter-apk/app-release.apk
